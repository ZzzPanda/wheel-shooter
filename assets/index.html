<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轮椅枪手 - Wheelchair Gunner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; overflow: hidden; cursor: none; font-family: 'Courier New', monospace; }
canvas { display: block; }
#ui-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}
#hud {
  position: fixed; top: 10px; left: 10px; color: #0f0; font-size: 14px;
  z-index: 11; pointer-events: none; text-shadow: 0 0 4px #0f0;
}
#hud div { margin-bottom: 4px; }
#xp-bar-container {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  width: 400px; height: 16px; background: #222; border: 1px solid #0f0;
  z-index: 11; pointer-events: none; border-radius: 8px; overflow: hidden;
}
#xp-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #0a0, #0f0); transition: width 0.2s; }
#xp-text {
  position: fixed; bottom: 38px; left: 50%; transform: translateX(-50%);
  color: #0f0; font-size: 12px; z-index: 11; pointer-events: none;
  text-shadow: 0 0 4px #0f0;
}
#level-up-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.8); z-index: 100; display: none;
  justify-content: center; align-items: center; flex-direction: column;
}
#level-up-screen h2 { color: #ff0; font-size: 32px; margin-bottom: 20px; text-shadow: 0 0 10px #ff0; }
#upgrade-options { display: flex; gap: 16px; }
.upgrade-card {
  width: 180px; padding: 20px; background: #1a1a2e; border: 2px solid #0f0;
  border-radius: 12px; color: #eee; cursor: pointer; pointer-events: all;
  transition: all 0.2s; text-align: center;
}
.upgrade-card:hover { border-color: #ff0; transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,0,0.3); }
.upgrade-card .icon { font-size: 36px; margin-bottom: 10px; }
.upgrade-card .name { font-size: 16px; font-weight: bold; color: #0f0; margin-bottom: 8px; }
.upgrade-card .desc { font-size: 12px; color: #aaa; }
.upgrade-card .rarity { font-size: 11px; font-weight: bold; margin-bottom: 6px; }
.upgrade-card.rarity-white { border-color: #aaa; }
.upgrade-card.rarity-white .rarity { color: #aaa; }
.upgrade-card.rarity-blue { border-color: #4af; }
.upgrade-card.rarity-blue .rarity { color: #4af; }
.upgrade-card.rarity-purple { border-color: #a4f; box-shadow: 0 0 10px rgba(160,60,255,0.2); }
.upgrade-card.rarity-purple .rarity { color: #a4f; }
.upgrade-card.rarity-orange { border-color: #f80; box-shadow: 0 0 15px rgba(255,140,0,0.3); }
.upgrade-card.rarity-orange .rarity { color: #f80; }
.upgrade-card .effect-pos { color: #4f4; font-size: 12px; }
.upgrade-card .effect-neg { color: #f44; font-size: 12px; }
#start-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #0a0a0a; z-index: 200; display: flex;
  justify-content: center; align-items: center; flex-direction: column;
}
#start-screen h1 { color: #0f0; font-size: 48px; text-shadow: 0 0 20px #0f0; margin-bottom: 10px; }
#start-screen p { color: #888; font-size: 14px; margin-bottom: 30px; }
#start-screen .controls { color: #666; font-size: 12px; margin-bottom: 20px; line-height: 1.8; }
#start-btn {
  padding: 15px 50px; font-size: 20px; background: transparent;
  color: #0f0; border: 2px solid #0f0; cursor: pointer; font-family: 'Courier New';
  transition: all 0.2s; border-radius: 4px;
}
#start-btn:hover { background: #0f0; color: #000; }
#game-over-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); z-index: 200; display: none;
  justify-content: center; align-items: center; flex-direction: column;
}
#game-over-screen h1 { color: #f00; font-size: 48px; text-shadow: 0 0 20px #f00; margin-bottom: 10px; }
#game-over-screen .stats { color: #aaa; font-size: 16px; margin-bottom: 30px; line-height: 2; }
#restart-btn {
  padding: 15px 50px; font-size: 20px; background: transparent;
  color: #f00; border: 2px solid #f00; cursor: pointer; font-family: 'Courier New';
  transition: all 0.2s; border-radius: 4px;
}
#restart-btn:hover { background: #f00; color: #000; }
#wave-announce {
  position: fixed; top: 30%; left: 50%; transform: translate(-50%,-50%);
  color: #ff0; font-size: 36px; z-index: 15; pointer-events: none;
  text-shadow: 0 0 20px #ff0; opacity: 0; transition: opacity 0.5s;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud">
  <div>HP: <span id="hp">100</span> / <span id="maxhp">100</span></div>
  <div>等级: <span id="level">1</span></div>
  <div>击杀: <span id="kills">0</span></div>
  <div>波次: <span id="wave">1</span></div>
  <div>时间: <span id="timer">0:00</span></div>
  <div>连杀: <span id="streak">0</span></div>
  <div>磁力脉冲: <span id="pulse-cd">就绪</span></div>
  <div>冲刺: <span id="dash-cd">就绪</span></div>
  <div>炸弹[Q]: <span id="bomb-cd">0/30</span></div>
</div>

<div id="xp-text">EXP: <span id="xp-val">0</span> / <span id="xp-need">10</span></div>
<div id="xp-bar-container"><div id="xp-bar"></div></div>

<div id="wave-announce"></div>

<div id="level-up-screen">
  <h2>升 级</h2>
  <div id="upgrade-options"></div>
</div>

<div id="start-screen">
  <h1>轮椅枪手</h1>
  <p>Wheelchair Gunner</p>
  <div class="controls">
    WASD / 方向键 - 移动<br>
    鼠标瞄准 - 手动射击<br>
    左键按住 - 连发开火（有后坐力！）<br>
    右键 - 冲刺闪避（3秒冷却）<br>
    Q - 炸弹（击杀30敌人充能）<br>
    空格 / Shift - 刹车（大幅减速）<br>
    轮椅自动炮塔 - 自动锁定敌人
  </div>
  <button id="start-btn">开始游戏</button>
</div>

<div id="game-over-screen">
  <h1>游戏结束</h1>
  <div class="stats">
    <div>存活时间: <span id="final-time">0:00</span></div>
    <div>最终等级: <span id="final-level">1</span></div>
    <div>击杀数: <span id="final-kills">0</span></div>
  </div>
  <button id="restart-btn">再来一次</button>
</div>

<script>
// === PLACEHOLDER: All game code below ===
// SECTION: Constants & Config
// SECTION: Game State
// SECTION: Player
// SECTION: Input
// SECTION: Enemies
// SECTION: Bullets & Weapons
// SECTION: Particles
// SECTION: XP & Leveling
// SECTION: Upgrades
// SECTION: Rendering
// SECTION: Game Loop
// SECTION: Init

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// ===================== PLAYER SPRITE =====================
const playerImg = new Image();
let playerImgReady = false;
playerImg.onload = () => { playerImgReady = true; console.log('Player sprite loaded'); };
playerImg.onerror = (e) => { console.error('Player sprite load failed', e); playerImgReady = false; };
const SPRITE_SIZE = 48; // drawn size on screen

// ===================== RAILGUN SPRITE =====================
const railgunImg = new Image();
let railgunImgReady = false;
railgunImg.onload = () => { railgunImgReady = true; console.log('Railgun sprite loaded'); };
railgunImg.onerror = (e) => { console.error('Railgun sprite load failed', e); railgunImgReady = false; };
const GUN_LENGTH = 64; // drawn length on screen
const GUN_HEIGHT = 26; // drawn height on screen

// Defer src assignment to after declarations
playerImg.src = 'player.png';
railgunImg.src = 'railgun.png';

// ===================== CONSTANTS =====================
const PLAYER_RADIUS = 18;
const PLAYER_SPEED = 0.8;
const RECOIL_FORCE = 1.2;
const FRICTION = 0.88;
const MANUAL_FIRE_RATE = 10;
const AUTO_FIRE_RATE = 45;
const BULLET_SPEED = 10;
const AUTO_BULLET_SPEED = 7;
const MANUAL_DAMAGE = 5;
const AUTO_DAMAGE = 8;
const XP_BASE = 10;
const XP_GROWTH = 1.35;
const ENEMY_SPAWN_DIST = 500;
const DASH_SPEED = 12;
const DASH_DURATION = 8;
const DASH_COOLDOWN = 180; // 3 seconds at 60fps

// ===================== WEB AUDIO =====================
let audioCtx = null;
function initAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(type) {
  if(!audioCtx) return;
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  let t = audioCtx.currentTime;
  if(type === 'shoot') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(600, t);
    osc.frequency.exponentialRampToValueAtTime(100, t+0.08);
    gain.gain.setValueAtTime(0.08, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.08);
    osc.start(t); osc.stop(t+0.08);
  } else if(type === 'autoShoot') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(900, t);
    osc.frequency.exponentialRampToValueAtTime(200, t+0.05);
    gain.gain.setValueAtTime(0.04, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.05);
    osc.start(t); osc.stop(t+0.05);
  } else if(type === 'hit') {
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, t);
    osc.frequency.exponentialRampToValueAtTime(80, t+0.06);
    gain.gain.setValueAtTime(0.06, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.06);
    osc.start(t); osc.stop(t+0.06);
  } else if(type === 'kill') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.exponentialRampToValueAtTime(800, t+0.1);
    gain.gain.setValueAtTime(0.06, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.12);
    osc.start(t); osc.stop(t+0.12);
  } else if(type === 'levelup') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.setValueAtTime(600, t+0.1);
    osc.frequency.setValueAtTime(800, t+0.2);
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.4);
    osc.start(t); osc.stop(t+0.4);
  } else if(type === 'dash') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(400, t+0.12);
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.15);
    osc.start(t); osc.stop(t+0.15);
  } else if(type === 'pickup') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, t);
    osc.frequency.exponentialRampToValueAtTime(900, t+0.06);
    gain.gain.setValueAtTime(0.05, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.06);
    osc.start(t); osc.stop(t+0.06);
  } else if(type === 'hurt') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(120, t);
    osc.frequency.exponentialRampToValueAtTime(60, t+0.15);
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.15);
    osc.start(t); osc.stop(t+0.15);
  } else if(type === 'boss') {
    // deep rumble
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(60, t);
    osc.frequency.exponentialRampToValueAtTime(30, t+0.5);
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.5);
    osc.start(t); osc.stop(t+0.5);
  } else if(type === 'pulse') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(100, t+0.3);
    gain.gain.setValueAtTime(0.08, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.35);
    osc.start(t); osc.stop(t+0.35);
  } else if(type === 'bomb') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, t);
    osc.frequency.exponentialRampToValueAtTime(20, t+0.6);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.7);
    osc.start(t); osc.stop(t+0.7);
  } else if(type === 'enemyShoot') {
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(350, t);
    osc.frequency.exponentialRampToValueAtTime(150, t+0.07);
    gain.gain.setValueAtTime(0.04, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.07);
    osc.start(t); osc.stop(t+0.07);
  }
}

// ===================== GAME STATE =====================
let gameRunning = false;
let gamePaused = false;
let gameTime = 0;
let waveNum = 1;
let waveTimer = 0;
let kills = 0;
let shakeX = 0, shakeY = 0;
let camX = 0, camY = 0;
let killStreak = 0, killStreakTimer = 0;
let hpPotions = [];
let enemyBullets = [];
let groundFX = []; // blood splatters, scorch marks
let bombCharges = 0, bombMax = 30, bombFlash = 0;
let obstacles = [];

// ===================== PLAYER STATE =====================
let player = {};
function resetPlayer() {
  player = {
    x: 0, y: 0, vx: 0, vy: 0, angle: 0,
    hp: 100, maxHp: 100,
    level: 1, xp: 0, xpToNext: XP_BASE,
    manualFireCD: 0, autoFireCD: 0, autoFireCDs: [],
    // stats (upgradeable)
    manualDmg: MANUAL_DAMAGE, autoDmg: AUTO_DAMAGE,
    manualRate: MANUAL_FIRE_RATE, autoRate: AUTO_FIRE_RATE,
    bulletSpeed: BULLET_SPEED, autoBulletSpeed: AUTO_BULLET_SPEED,
    recoilMult: 1, speedMult: 1, armor: 0,
    autoTurrets: 1, piercing: 0, lifeSteal: 0,
    bulletSize: 1, autoBulletSize: 1,
    magnetRange: 60,
    iFrames: 0,
    magnetPulseCD: 0, magnetPulseRate: 3600, magnetPulseActive: 0, // 60s at 60fps
    brakeDmgMult: 1.5, // 刹车时手动伤害倍率
    dashCD: 0, dashTimer: 0, dashVX: 0, dashVY: 0, // 冲刺
  };
}

// ===================== INPUT =====================
const keys = {};
let mouseX = W/2, mouseY = H/2;
let mouseDown = false;
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.key===' '||e.key==='Shift') keys[e.key]=true; if(e.key.toLowerCase()==='q') triggerBomb(); e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; if(e.key===' '||e.key==='Shift') keys[e.key]=false; });
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mousedown', e => { if(e.button===0) mouseDown = true; if(e.button===2) triggerDash(); });
window.addEventListener('mouseup', e => { if(e.button===0) mouseDown = false; });
window.addEventListener('contextmenu', e => e.preventDefault());

// ===================== ARRAYS =====================
let bullets = [];
let enemies = [];
let particles = [];
let xpOrbs = [];
let magnetOrbs = [];
let dmgTexts = [];

// ===================== ENEMY TYPES =====================
const ENEMY_TYPES = [
  { name:'zombie', hp:40, speed:0.5, radius:13, color:'#4a4', dmg:18, xp:3 },
  { name:'fast',   hp:20, speed:1.1, radius:10, color:'#a4a', dmg:14, xp:2 },
  { name:'tank',   hp:150,speed:0.25,radius:22, color:'#a44', dmg:35, xp:8 },
  { name:'swarm',  hp:12, speed:0.8, radius:8,  color:'#aa4', dmg:10, xp:1 },
  { name:'elite',  hp:300,speed:0.4, radius:26, color:'#f80', dmg:50, xp:15},
  { name:'boss',   hp:1500,speed:0.2,radius:40, color:'#f0f', dmg:80, xp:60},
  { name:'shooter',hp:35,  speed:0.3,radius:12, color:'#f44', dmg:12, xp:5, shootCD:120},
];

function spawnEnemy() {
  let angle = Math.random() * Math.PI * 2;
  let dist = ENEMY_SPAWN_DIST + Math.random() * 100;
  let sx = player.x + Math.cos(angle) * dist;
  let sy = player.y + Math.sin(angle) * dist;
  // pick type based on wave
  let pool = [0,0,0,1,3]; // weighted
  if(waveNum >= 3) pool.push(1,1,3,3);
  if(waveNum >= 5) pool.push(2);
  if(waveNum >= 4) pool.push(6); // shooter
  if(waveNum >= 7) pool.push(6,6); // more shooters
  if(waveNum >= 8) pool.push(4);
  if(waveNum >= 10) pool.push(2,2,4);
  let ti = pool[Math.floor(Math.random()*pool.length)];
  let t = ENEMY_TYPES[ti];
  let hpMult = 1 + (waveNum-1)*0.15;
  enemies.push({
    x:sx, y:sy, hp:t.hp*hpMult, maxHp:t.hp*hpMult,
    speed:t.speed, radius:t.radius, color:t.color,
    dmg:t.dmg, xp:t.xp, type:t.name, hitFlash:0,
    shootCD: t.shootCD ? t.shootCD + Math.floor(Math.random()*60) : 0,
    shootRate: t.shootCD || 0,
  });
}

function spawnBoss() {
  let angle = Math.random() * Math.PI * 2;
  let dist = ENEMY_SPAWN_DIST + 150;
  let sx = player.x + Math.cos(angle) * dist;
  let sy = player.y + Math.sin(angle) * dist;
  let t = ENEMY_TYPES[5]; // boss type
  let hpMult = 1 + (waveNum-1)*0.2;
  enemies.push({
    x:sx, y:sy, hp:t.hp*hpMult, maxHp:t.hp*hpMult,
    speed:t.speed, radius:t.radius, color:t.color,
    dmg:t.dmg, xp:t.xp, type:'boss', hitFlash:0, isBoss:true,
  });
  playSound('boss');
  // announce
  let ann = document.getElementById('wave-announce');
  ann.textContent = '⚠ BOSS来袭 ⚠';
  ann.style.opacity = '1';
  ann.style.color = '#f0f';
  setTimeout(()=>{ ann.style.opacity='0'; ann.style.color='#ff0'; }, 2500);
}

function triggerDash() {
  if(!gameRunning || gamePaused) return;
  if(player.dashCD > 0 || player.dashTimer > 0) return;
  initAudio();
  // dash toward mouse cursor
  let screenPX = player.x - camX + W/2;
  let screenPY = player.y - camY + H/2;
  let angle = Math.atan2(mouseY - screenPY, mouseX - screenPX);
  player.dashVX = Math.cos(angle) * DASH_SPEED;
  player.dashVY = Math.sin(angle) * DASH_SPEED;
  player.dashTimer = DASH_DURATION;
  player.dashCD = DASH_COOLDOWN;
  player.iFrames = Math.max(player.iFrames, DASH_DURATION + 5);
  playSound('dash');
  // dash trail particles
  for(let i=0;i<8;i++){
    let a = Math.random()*Math.PI*2;
    particles.push({
      x: player.x, y: player.y,
      vx: Math.cos(a)*2, vy: Math.sin(a)*2,
      life:15, maxLife:15, radius:4, color:'#88f',
    });
  }
}

function triggerBomb() {
  if(!gameRunning || gamePaused) return;
  if(bombCharges < bombMax) return;
  bombCharges = 0;
  bombFlash = 20;
  playSound('bomb');
  shakeX = (Math.random()-0.5)*15;
  shakeY = (Math.random()-0.5)*15;
  // kill all enemies on screen (within ~600px)
  for(let i=enemies.length-1;i>=0;i--){
    let e = enemies[i];
    let d = Math.hypot(e.x-player.x, e.y-player.y);
    if(d < 600){
      let dmg = e.isBoss ? e.maxHp*0.4 : e.hp; // bosses take 40% max HP
      e.hp -= dmg;
      if(e.hp <= 0){
        spawnDeathParticles(e.x, e.y, e.color, 8);
        spawnXpOrb(e.x, e.y, e.xp);
        groundFX.push({ x:e.x, y:e.y, radius:e.radius*1.5, color:'#300', life:600 });
        kills++;
        bombCharges = Math.min(bombMax, bombCharges+1);
        enemies.splice(i,1);
      } else {
        e.hitFlash = 8;
        addDmgText(e.x, e.y-e.radius, Math.floor(dmg), '#f80');
      }
    }
  }
  // clear enemy bullets
  enemyBullets = [];
  // big explosion ring
  for(let i=0;i<32;i++){
    let a = Math.PI*2*i/32;
    let r = 200+Math.random()*400;
    particles.push({
      x:player.x+Math.cos(a)*r*0.3, y:player.y+Math.sin(a)*r*0.3,
      vx:Math.cos(a)*8, vy:Math.sin(a)*8,
      life:25, maxLife:25, radius:6+Math.random()*4, color:Math.random()>0.5?'#f80':'#ff0',
    });
  }
}

function spawnGroundFX(x, y, color) {
  if(groundFX.length > 80) groundFX.shift(); // limit
  groundFX.push({ x, y, radius: 5+Math.random()*8, color, life:500+Math.random()*300 });
}

// ===================== OBSTACLES =====================
function generateObstacles() {
  obstacles = [];
  // generate clusters of rocks/barricades around spawn
  let types = ['rock','crate','pillar'];
  for(let ring=1; ring<=6; ring++){
    let count = 8 + ring*4;
    let baseR = ring * 250;
    for(let i=0; i<count; i++){
      let angle = Math.random()*Math.PI*2;
      let dist = baseR + (Math.random()-0.5)*200;
      let x = Math.cos(angle)*dist;
      let y = Math.sin(angle)*dist;
      let t = types[Math.floor(Math.random()*types.length)];
      let w, h;
      if(t === 'rock'){ w = 20+Math.random()*25; h = 20+Math.random()*25; }
      else if(t === 'crate'){ w = 25+Math.random()*15; h = 25+Math.random()*15; }
      else { w = 12+Math.random()*8; h = 30+Math.random()*30; }
      obstacles.push({ x, y, w, h, type:t, color: t==='rock'?'#444':t==='crate'?'#553':'#555' });
    }
  }
}

function drawObstacles() {
  for(let o of obstacles){
    let sx = o.x - camX + W/2;
    let sy = o.y - camY + H/2;
    if(sx < -60 || sx > W+60 || sy < -60 || sy > H+60) continue;
    ctx.save();
    if(o.type === 'rock'){
      ctx.fillStyle = o.color;
      ctx.beginPath();
      ctx.ellipse(sx, sy, o.w/2, o.h/2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else if(o.type === 'crate'){
      ctx.fillStyle = o.color;
      ctx.fillRect(sx-o.w/2, sy-o.h/2, o.w, o.h);
      ctx.strokeStyle = '#774';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx-o.w/2, sy-o.h/2, o.w, o.h);
      // cross lines
      ctx.strokeStyle = '#663';
      ctx.beginPath();
      ctx.moveTo(sx-o.w/2, sy-o.h/2); ctx.lineTo(sx+o.w/2, sy+o.h/2);
      ctx.moveTo(sx+o.w/2, sy-o.h/2); ctx.lineTo(sx-o.w/2, sy+o.h/2);
      ctx.stroke();
    } else { // pillar
      ctx.fillStyle = o.color;
      ctx.fillRect(sx-o.w/2, sy-o.h/2, o.w, o.h);
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx-o.w/2, sy-o.h/2, o.w, o.h);
    }
    ctx.restore();
  }
}

function obstacleCollide(cx, cy, cr) {
  // circle vs AABB collision; returns push vector or null
  for(let o of obstacles){
    let nearX = Math.max(o.x-o.w/2, Math.min(cx, o.x+o.w/2));
    let nearY = Math.max(o.y-o.h/2, Math.min(cy, o.y+o.h/2));
    let dx = cx-nearX, dy = cy-nearY;
    let dist = Math.hypot(dx, dy);
    if(dist < cr && dist > 0){
      let push = (cr - dist);
      return { x: (dx/dist)*push, y: (dy/dist)*push };
    }
  }
  return null;
}

function bulletHitsObstacle(bx, by, br) {
  for(let o of obstacles){
    let nearX = Math.max(o.x-o.w/2, Math.min(bx, o.x+o.w/2));
    let nearY = Math.max(o.y-o.h/2, Math.min(by, o.y+o.h/2));
    let dist = Math.hypot(bx-nearX, by-nearY);
    if(dist < br) return true;
  }
  return false;
}

// ===================== SHOOTING =====================
function fireManualBullet() {
  let screenPX = player.x - camX + W/2;
  let screenPY = player.y - camY + H/2;
  let angle = Math.atan2(mouseY - screenPY, mouseX - screenPX);
  let speed = player.bulletSpeed;
  // accuracy: braking = precise, moving = random spread
  let brakingNow = keys[' '] || keys['shift'];
  let spread = brakingNow ? 0.01 : 0.55;
  let a = angle + (Math.random()-0.5)*spread;
  bullets.push({
    x: player.x + Math.cos(angle)*22,
    y: player.y + Math.sin(angle)*22,
    vx: Math.cos(a)*speed, vy: Math.sin(a)*speed,
    dmg: player.manualDmg * (brakingNow ? player.brakeDmgMult : 1), radius: 4 * player.bulletSize,
    color: brakingNow ? '#fa0' : '#ff0', life: 90, type:'manual', pierce: player.piercing,
  });
  // recoil (reduced when braking)
  let rc = RECOIL_FORCE * player.recoilMult * (brakingNow ? 0.3 : 1);
  player.vx -= Math.cos(angle) * rc;
  player.vy -= Math.sin(angle) * rc;
  // screen shake
  shakeX += (Math.random()-0.5) * 1.5;
  shakeY += (Math.random()-0.5) * 1.5;
  // muzzle flash particles
  for(let i=0;i<2;i++){
    particles.push({
      x: player.x+Math.cos(angle)*24, y: player.y+Math.sin(angle)*24,
      vx: Math.cos(a+Math.random()-0.5)*3, vy: Math.sin(a+Math.random()-0.5)*3,
      life: 8, maxLife:8, radius:3, color:'#ff0',
    });
  }
  playSound('shoot');
}

function fireAutoBullet(turretIndex) {
  // find nearest enemy
  let nearest = null, nd = Infinity;
  for(let e of enemies){
    let d = Math.hypot(e.x-player.x, e.y-player.y);
    if(d < nd && d < 350){ nd = d; nearest = e; }
  }
  if(!nearest) return;
  let angle = Math.atan2(nearest.y-player.y, nearest.x-player.x);
  // offset turret position
  let offset = (turretIndex % 2 === 0 ? -1 : 1) * 12;
  let perpA = angle + Math.PI/2;
  let ox = player.x + Math.cos(perpA)*offset;
  let oy = player.y + Math.sin(perpA)*offset;
  let spread = 0.08;
  let a = angle + (Math.random()-0.5)*spread;
  bullets.push({
    x: ox + Math.cos(angle)*18,
    y: oy + Math.sin(angle)*18,
    vx: Math.cos(a)*player.autoBulletSpeed, vy: Math.sin(a)*player.autoBulletSpeed,
    dmg: player.autoDmg, radius: 3 * player.autoBulletSize,
    color: '#0ff', life: 70, type:'auto', pierce: 0,
  });
  // small particles
  particles.push({
    x: ox+Math.cos(angle)*20, y: oy+Math.sin(angle)*20,
    vx: Math.cos(a)*2, vy: Math.sin(a)*2,
    life:5, maxLife:5, radius:2, color:'#0ff',
  });
  playSound('autoShoot');
}

];

  { txt:'移速-10%', apply(p){ p.speedMult*=0.9; }},
  { txt:'最大HP-15', apply(p){ p.maxHp=Math.max(20,p.maxHp-15); p.hp=Math.min(p.hp,p.maxHp); }},
  { txt:'手动射速-10%', apply(p){ p.manualRate*=1.1; }},

];

const RARITY_CONFIG = [
  { name:'普通', cls:'white',  label:'白', posCount:1, negCount:0, weight:50 },
  { name:'精良', cls:'blue',   label:'蓝', posCount:2, negCount:1, weight:30 },
  { name:'稀有', cls:'purple', label:'紫', posCount:2, negCount:1, weight:15 },
  { name:'传说', cls:'orange', label:'橙', posCount:3, negCount:1, weight:5 },
];

function rollRarity() {
  let total = RARITY_CONFIG.reduce((s,r)=>s+r.weight, 0);
  let roll = Math.random() * total;
  for(let r of RARITY_CONFIG){ roll -= r.weight; if(roll <= 0) return r; }
  return RARITY_CONFIG[0];
}

function generateUpgrade() {
  let rarity = rollRarity();
  let posPool = [...POS_EFFECTS];
  let negPool = [...NEG_EFFECTS];
  let positives = [];
  let negatives = [];
  // pick positive effects
  for(let i=0; i<rarity.posCount && posPool.length; i++){
    let idx = Math.floor(Math.random()*posPool.length);
    positives.push(posPool.splice(idx,1)[0]);
  }
  // pick negative effects (blue+ only)
  if(rarity.negCount > 0){
    for(let i=0; i<rarity.negCount && negPool.length; i++){
      let idx = Math.floor(Math.random()*negPool.length);
      negatives.push(negPool.splice(idx,1)[0]);
    }
  }
  // for purple/orange, boost positive values slightly
  let name = positives.length > 0 ? positives[0].txt.replace(/[+\-].*/, '') : '强化';
  if(positives.length >= 2) name += '+';
  if(positives.length >= 3) name += '+';
  return { rarity, positives, negatives, name };
}

let pendingUpgrades = [];
function showLevelUp() {
  gamePaused = true;
  document.getElementById('level-up-screen').style.display = 'flex';
  let opts = document.getElementById('upgrade-options');
  opts.innerHTML = '';
  // generate 3 random upgrades
  let picks = [];
  for(let i=0;i<3;i++) picks.push(generateUpgrade());
  picks.forEach(up => {
    let card = document.createElement('div');
    card.className = 'upgrade-card rarity-' + up.rarity.cls;
    let effectsHtml = '';
    for(let e of up.positives) effectsHtml += `<div class="effect-pos">+ ${e.txt}</div>`;
    for(let e of up.negatives) effectsHtml += `<div class="effect-neg">- ${e.txt}</div>`;
    card.innerHTML = `<div class="rarity">[${up.rarity.name}]</div><div class="name">${up.name}</div>${effectsHtml}`;
    card.addEventListener('click', () => {
      for(let e of up.positives) e.apply(player);
      for(let e of up.negatives) e.apply(player);
      document.getElementById('level-up-screen').style.display = 'none';
      gamePaused = false;
    });
    opts.appendChild(card);
  });
}

function gainXp(amount) {
  player.xp += amount;
  while(player.xp >= player.xpToNext) {
    player.xp -= player.xpToNext;
    player.level++;
    player.xpToNext = Math.floor(XP_BASE * Math.pow(XP_GROWTH, player.level-1));
    playSound('levelup');
    showLevelUp();
  }
}

// ===================== DRAW PLAYER =====================
function drawPlayer() {
  let sx = player.x - camX + W/2;
  let sy = player.y - camY + H/2;
  let screenPX = sx, screenPY = sy;
  let aimAngle = Math.atan2(mouseY - screenPY, mouseX - screenPX);
  player.angle = aimAngle;

  ctx.save();
  ctx.translate(sx, sy);

  // player sprite (drawn first, behind weapons)
  if(playerImgReady){
    ctx.save();
    // flip sprite to face aim direction
    if(Math.abs(aimAngle) > Math.PI/2){
      ctx.scale(-1, 1);
    }
    // iframes blink
    if(player.iFrames > 0 && Math.floor(player.iFrames/3)%2){
      ctx.globalAlpha = 0.4;
    }
    let ratio = playerImg.height / playerImg.width;
    let drawW = SPRITE_SIZE;
    let drawH = SPRITE_SIZE * ratio;
    ctx.drawImage(playerImg, -drawW/2, -drawH/2, drawW, drawH);
    ctx.restore();
  } else {
    // fallback circle
    ctx.beginPath();
    ctx.arc(0, 0, PLAYER_RADIUS, 0, Math.PI*2);
    ctx.fillStyle = '#333';
    ctx.fill();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // main gun (manual) - drawn on top of sprite
  ctx.save();
  ctx.rotate(aimAngle);
  if(railgunImgReady){
    // draw railgun sprite; image points right naturally
    let gw = GUN_LENGTH, gh = GUN_HEIGHT;
    ctx.drawImage(railgunImg, 4, -gh/2, gw, gh);
  } else {
    // fallback rectangles
    ctx.fillStyle = '#888';
    ctx.fillRect(12, -3, 22, 6);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(30, -4, 6, 8);
    ctx.fillStyle = '#ff0';
    ctx.globalAlpha = 0.6;
    ctx.fillRect(34, -2, 3, 4);
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  // auto turrets - evenly distributed orbiting around character
  let turretOrbitR = 30; // orbit radius around player center
  for(let i=0;i<player.autoTurrets;i++){
    // evenly space turrets around full circle, slowly rotate over time
    let baseAngle = (Math.PI*2 / player.autoTurrets) * i + gameTime * 0.01;
    let nearest = null, nd = Infinity;
    for(let e of enemies){
      let d = Math.hypot(e.x-player.x, e.y-player.y);
      if(d<nd && d<350){ nd=d; nearest=e; }
    }
    let turretAim = nearest ? Math.atan2(nearest.y-player.y, nearest.x-player.x) : baseAngle;
    let tx = Math.cos(baseAngle)*turretOrbitR;
    let ty = Math.sin(baseAngle)*turretOrbitR;
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(turretAim);
    ctx.fillStyle = '#0aa';
    ctx.fillRect(-4,-4,8,8);
    ctx.fillStyle = '#0ff';
    ctx.fillRect(4,-2.5,14,5);
    ctx.restore();
  }

  ctx.restore();

  // HP bar
  if(player.hp < player.maxHp) {
    let bw = 40;
    ctx.fillStyle = '#400';
    ctx.fillRect(sx-bw/2, sy-PLAYER_RADIUS-14, bw, 4);
    ctx.fillStyle = '#f00';
    ctx.fillRect(sx-bw/2, sy-PLAYER_RADIUS-14, bw*(player.hp/player.maxHp), 4);
  }
}

// ===================== DRAW ENEMIES =====================
function drawEnemies() {
  for(let e of enemies){
    let sx = e.x - camX + W/2;
    let sy = e.y - camY + H/2;
    if(sx < -50 || sx > W+50 || sy < -50 || sy > H+50) continue;

    // boss aura
    if(e.isBoss){
      ctx.save();
      let pulse = 1 + Math.sin(Date.now()*0.005)*0.15;
      ctx.globalAlpha = 0.15;
      ctx.beginPath();
      ctx.arc(sx, sy, e.radius*2*pulse, 0, Math.PI*2);
      ctx.fillStyle = '#f0f';
      ctx.fill();
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(sx, sy, e.radius*1.4, 0, Math.PI*2);
      ctx.strokeStyle = '#f0f';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(sx, sy, e.radius, 0, Math.PI*2);
    ctx.fillStyle = e.hitFlash > 0 ? '#fff' : e.color;
    ctx.fill();

    // eyes toward player
    let angle = Math.atan2(player.y-e.y, player.x-e.x);
    // shooter gun barrel
    if(e.type === 'shooter'){
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(angle);
      ctx.fillStyle = '#a00';
      ctx.fillRect(e.radius*0.5, -2, e.radius, 4);
      ctx.restore();
    }
    let ex1 = sx + Math.cos(angle-0.3)*e.radius*0.4;
    let ey1 = sy + Math.sin(angle-0.3)*e.radius*0.4;
    let ex2 = sx + Math.cos(angle+0.3)*e.radius*0.4;
    let ey2 = sy + Math.sin(angle+0.3)*e.radius*0.4;
    ctx.fillStyle = '#f00';
    ctx.beginPath(); ctx.arc(ex1,ey1,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2,ey2,2,0,Math.PI*2); ctx.fill();

    // hp bar
    if(e.hp < e.maxHp){
      let bw = e.radius*2;
      ctx.fillStyle = '#400';
      ctx.fillRect(sx-bw/2, sy-e.radius-8, bw, 3);
      ctx.fillStyle = '#f44';
      ctx.fillRect(sx-bw/2, sy-e.radius-8, bw*(e.hp/e.maxHp), 3);
    }
  }
}

// ===================== DRAW BULLETS =====================
function drawBullets() {
  for(let b of bullets){
    let sx = b.x - camX + W/2;
    let sy = b.y - camY + H/2;
    // trail
    ctx.save();
    let trailLen = b.type === 'manual' ? 3 : 2;
    for(let t=1; t<=trailLen; t++){
      let tx = sx - b.vx*t*1.5;
      let ty = sy - b.vy*t*1.5;
      ctx.globalAlpha = 0.15 / t;
      ctx.beginPath();
      ctx.arc(tx, ty, b.radius * (1 - t*0.15), 0, Math.PI*2);
      ctx.fillStyle = b.color;
      ctx.fill();
    }
    ctx.restore();
    // bullet
    ctx.beginPath();
    ctx.arc(sx, sy, b.radius, 0, Math.PI*2);
    ctx.fillStyle = b.color;
    ctx.fill();
    // glow
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(sx, sy, b.radius*2.5, 0, Math.PI*2);
    ctx.fillStyle = b.color;
    ctx.fill();
    ctx.restore();
  }
}

// ===================== DRAW PARTICLES =====================
function drawParticles() {
  for(let p of particles){
    let sx = p.x - camX + W/2;
    let sy = p.y - camY + H/2;

    ctx.globalAlpha = p.life / p.maxLife;

    ctx.arc(sx, sy, p.radius * (p.life/p.maxLife), 0, Math.PI*2);
    ctx.fillStyle = p.color;

    ctx.restore();

}

    ctx.globalAlpha = d.life / d.maxLife;
    ctx.font = 'bold 14px Courier New';
    ctx.fillStyle = d.color;
    ctx.textAlign = 'center';
    ctx.fillText(d.txt, sx, sy);
    ctx.restore();
  }
}

// ===================== UPDATE =====================
function update(dt) {
  if(gamePaused) return;

  gameTime += dt;
  waveTimer += dt;

  // wave progression
  if(waveTimer > 1800) { // every 30 seconds
    waveTimer = 0;
    waveNum++;
    let ann = document.getElementById('wave-announce');
    ann.textContent = `— 波次 ${waveNum} —`;
    ann.style.opacity = '1';
    setTimeout(()=>{ ann.style.opacity='0'; }, 2000);
    // boss spawn every 5 waves
    if(waveNum % 5 === 0){
      setTimeout(()=>{ spawnBoss(); }, 1500);
    }
  }

  // player movement
  let mx = 0, my = 0;
  if(keys['w']||keys['arrowup']) my = -1;
  if(keys['s']||keys['arrowdown']) my = 1;
  if(keys['a']||keys['arrowleft']) mx = -1;
  if(keys['d']||keys['arrowright']) mx = 1;
  // brake (space key) - heavy friction to stop movement including recoil
  let braking = keys[' '] || keys['shift'];
  let currentFriction = braking ? 0.6 : FRICTION;

  if(mx||my){
    let len = Math.hypot(mx,my);
    mx/=len; my/=len;
    let spd = PLAYER_SPEED * player.speedMult * (braking ? 0.3 : 1);
    player.vx += mx * spd * 0.3;
    player.vy += my * spd * 0.3;
  }
  player.vx *= currentFriction;
  player.vy *= currentFriction;
  // dash movement
  if(player.dashTimer > 0){
    player.dashTimer--;
    player.x += player.dashVX;
    player.y += player.dashVY;
    // dash trail
    if(player.dashTimer % 2 === 0){
      particles.push({
        x: player.x, y: player.y,
        vx: (Math.random()-0.5)*1, vy: (Math.random()-0.5)*1,
        life:12, maxLife:12, radius:5, color:'#88f',
      });
    }
  }
  if(player.dashCD > 0) player.dashCD -= dt;
  player.x += player.vx;
  player.y += player.vy;

  // no map boundary - infinite map

  // obstacle collision for player
  let pPush = obstacleCollide(player.x, player.y, PLAYER_RADIUS);
  if(pPush){ player.x += pPush.x; player.y += pPush.y; player.vx *= 0.5; player.vy *= 0.5; }

  // iframes
  if(player.iFrames > 0) player.iFrames--;

  // manual fire
  if(player.manualFireCD > 0) player.manualFireCD -= dt;
  if(mouseDown && player.manualFireCD <= 0){
    fireManualBullet();
    player.manualFireCD = player.manualRate;
  }

  // auto fire (per-turret independent cooldowns)
  for(let i=0; i<player.autoTurrets; i++){
    if(!player.autoFireCDs[i]) player.autoFireCDs[i] = Math.floor(i * player.autoRate / player.autoTurrets);
    if(player.autoFireCDs[i] > 0) player.autoFireCDs[i] -= dt;
    if(player.autoFireCDs[i] <= 0 && enemies.length > 0){
      fireAutoBullet(i);
      player.autoFireCDs[i] = player.autoRate;
    }
  }

  // update bullets
  for(let i=bullets.length-1; i>=0; i--){
    let b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if(b.life <= 0){ bullets.splice(i,1); continue; }
    // check obstacle collision
    if(bulletHitsObstacle(b.x, b.y, b.radius)){ bullets.splice(i,1); continue; }
    // check enemy collision
    let hit = false;
    for(let j=enemies.length-1; j>=0; j--){
      let e = enemies[j];
      let d = Math.hypot(b.x-e.x, b.y-e.y);
      if(d < b.radius + e.radius){
        e.hp -= b.dmg;
        e.hitFlash = 4;
        addDmgText(e.x, e.y - e.radius, Math.floor(b.dmg), b.type==='manual'?'#ff0':'#0ff');
        playSound('hit');
        // knockback
        let ka = Math.atan2(e.y-player.y, e.x-player.x);
        e.x += Math.cos(ka)*3;
        e.y += Math.sin(ka)*3;

        if(e.hp <= 0){
          spawnDeathParticles(e.x, e.y, e.color, e.isBoss ? 30 : 12);
          playSound('kill');
          // kill streak bonus
          killStreak++;
          killStreakTimer = 120; // 2 seconds to maintain streak
          let xpBonus = Math.min(killStreak, 10); // up to 10x combo
          let totalXp = e.xp + Math.floor(e.xp * (xpBonus-1) * 0.2);
          spawnXpOrb(e.x, e.y, totalXp);
          if(killStreak >= 3){
            addDmgText(e.x, e.y - e.radius - 10, killStreak + 'x连杀!', '#ff0');
          }
          // random magnet drop (~8%)
          if(Math.random() < 0.08){
            magnetOrbs.push({ x:e.x, y:e.y, radius:6, life:900 });
          }
          // HP potion drop (~5%, guaranteed from boss)
          if(e.isBoss || Math.random() < 0.05){
            hpPotions.push({ x:e.x, y:e.y, radius:7, heal:e.isBoss?50:20, life:1200 });
          }
          kills++;
          bombCharges = Math.min(bombMax, bombCharges+1);
          spawnGroundFX(e.x, e.y, '#300');
          if(player.lifeSteal > 0){
            player.hp = Math.min(player.maxHp, player.hp + player.lifeSteal);
          }
          enemies.splice(j,1);
        }
        if(b.pierce > 0){ b.pierce--; b.dmg *= 0.7; }
        else { hit = true; }
        break;
      }
    }
    if(hit) bullets.splice(i,1);
  }

  // update enemies
  for(let e of enemies){
    let angle = Math.atan2(player.y-e.y, player.x-e.x);
    let d = Math.hypot(player.x-e.x, player.y-e.y);
    // shooters stop at range and shoot
    if(e.type === 'shooter' && d < 280){
      // don't approach closer, strafe slightly
      let perpAngle = angle + Math.PI/2;
      e.x += Math.cos(perpAngle) * e.speed * 0.5;
      e.y += Math.sin(perpAngle) * e.speed * 0.5;
    } else {
      e.x += Math.cos(angle) * e.speed;
      e.y += Math.sin(angle) * e.speed;
    }
    if(e.hitFlash > 0) e.hitFlash--;
    // enemy obstacle collision
    let ePush = obstacleCollide(e.x, e.y, e.radius);
    if(ePush){ e.x += ePush.x*1.5; e.y += ePush.y*1.5; }
    // shooter firing logic
    if(e.shootRate > 0){
      e.shootCD -= dt;
      if(e.shootCD <= 0 && d < 400){
        e.shootCD = e.shootRate;
        let bAngle = Math.atan2(player.y-e.y, player.x-e.x);
        let spread = 0.12;
        let ba = bAngle + (Math.random()-0.5)*spread;
        enemyBullets.push({
          x: e.x + Math.cos(bAngle)*e.radius,
          y: e.y + Math.sin(bAngle)*e.radius,
          vx: Math.cos(ba)*4, vy: Math.sin(ba)*4,
          dmg: e.dmg, radius: 4, color:'#f66', life:80,
        });
        playSound('enemyShoot');
      }
    }

    // collision with player
    if(d < PLAYER_RADIUS + e.radius && player.iFrames <= 0){
      let dmg = Math.max(1, e.dmg - player.armor);
      player.hp -= dmg;
      player.iFrames = 30;
      addDmgText(player.x, player.y - PLAYER_RADIUS, dmg, '#f44');
      playSound('hurt');
      // push both apart
      let pushA = Math.atan2(player.y-e.y, player.x-e.x);
      player.vx += Math.cos(pushA)*5;
      player.vy += Math.sin(pushA)*5;
      shakeX = (Math.random()-0.5)*6;
      shakeY = (Math.random()-0.5)*6;
    }
  }

  // enemy separation (prevent stacking)
  for(let i=0;i<enemies.length;i++){
    for(let j=i+1;j<enemies.length;j++){
      let a=enemies[i], b=enemies[j];
      let dx=b.x-a.x, dy=b.y-a.y;
      let d=Math.hypot(dx,dy);
      let minD=a.radius+b.radius;
      if(d<minD&&d>0){
        let push=(minD-d)*0.3/d;
        a.x-=dx*push; a.y-=dy*push;
        b.x+=dx*push; b.y+=dy*push;
      }
    }
  }

  // update enemy bullets
  for(let i=enemyBullets.length-1;i>=0;i--){
    let b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    b.life--;
    if(b.life <= 0){ enemyBullets.splice(i,1); continue; }
    if(bulletHitsObstacle(b.x, b.y, b.radius)){ enemyBullets.splice(i,1); continue; }
    let d = Math.hypot(player.x-b.x, player.y-b.y);
    if(d < PLAYER_RADIUS + b.radius && player.iFrames <= 0){
      let dmg = Math.max(1, b.dmg - player.armor);
      player.hp -= dmg;
      player.iFrames = 20;
      addDmgText(player.x, player.y - PLAYER_RADIUS, dmg, '#f66');
      playSound('hurt');
      shakeX = (Math.random()-0.5)*4;
      shakeY = (Math.random()-0.5)*4;
      enemyBullets.splice(i,1);
    }
  }

  // spawn enemies
  let spawnRate = Math.max(8, 50 - waveNum * 4);
  if(Math.random() < 1/spawnRate) spawnEnemy();

  // update magnet orbs
  for(let i=magnetOrbs.length-1;i>=0;i--){
    let o = magnetOrbs[i];
    o.life--;
    if(o.life<=0){ magnetOrbs.splice(i,1); continue; }
    let d = Math.hypot(player.x-o.x, player.y-o.y);
    // pull toward player when close
    if(d < player.magnetRange){
      let a = Math.atan2(player.y-o.y, player.x-o.x);
      o.x += Math.cos(a)*4; o.y += Math.sin(a)*4;
    }
    if(d < 20){
      // trigger magnet pulse
      player.magnetPulseActive = 40;
      magnetOrbs.splice(i,1);
      // visual burst
      for(let j=0;j<16;j++){
        let a = Math.PI*2*j/16;
        particles.push({
          x:player.x+Math.cos(a)*80, y:player.y+Math.sin(a)*80,
          vx:-Math.cos(a)*2, vy:-Math.sin(a)*2,
          life:20, maxLife:20, radius:4, color:'#4f4',
        });
      }
    }
  }

  // magnet pulse - periodically pulls ALL orbs on screen
  if(player.magnetPulseCD > 0) player.magnetPulseCD -= dt;
  if(player.magnetPulseCD <= 0){
    player.magnetPulseActive = 40; // pulse lasts 40 frames
    player.magnetPulseCD = player.magnetPulseRate;
    playSound('pulse');
    // visual pulse effect
    for(let i=0;i<16;i++){
      let a = Math.PI*2*i/16;
      particles.push({
        x:player.x+Math.cos(a)*80, y:player.y+Math.sin(a)*80,
        vx:-Math.cos(a)*2, vy:-Math.sin(a)*2,
        life:20, maxLife:20, radius:4, color:'#4f4',
      });
    }
  }
  if(player.magnetPulseActive > 0) player.magnetPulseActive--;

  // update HP potions
  for(let i=hpPotions.length-1;i>=0;i--){
    let p = hpPotions[i];
    p.life--;
    if(p.life<=0){ hpPotions.splice(i,1); continue; }
    let d = Math.hypot(player.x-p.x, player.y-p.y);
    if(d < player.magnetRange){
      let a = Math.atan2(player.y-p.y, player.x-p.x);
      p.x += Math.cos(a)*3; p.y += Math.sin(a)*3;
    }
    if(d < 20){
      player.hp = Math.min(player.maxHp, player.hp + p.heal);
      addDmgText(player.x, player.y - PLAYER_RADIUS - 10, '+'+p.heal+' HP', '#4f4');
      playSound('pickup');
      hpPotions.splice(i,1);
    }
  }

  // update xp orbs
  for(let i=xpOrbs.length-1;i>=0;i--){
    let o = xpOrbs[i];
    o.life--;
    if(o.life<=0){ xpOrbs.splice(i,1); continue; }
    let d = Math.hypot(player.x-o.x, player.y-o.y);
    let pulled = d < player.magnetRange || player.magnetPulseActive > 0;
    if(pulled){
      let a = Math.atan2(player.y-o.y, player.x-o.x);
      let speed = player.magnetPulseActive > 0 ? Math.max(6, 14 - d*0.005) : Math.max(2, 8 - d*0.05);
      o.x += Math.cos(a)*speed;
      o.y += Math.sin(a)*speed;
    }
    if(d < 15){
      gainXp(o.amount);
      playSound('pickup');
      xpOrbs.splice(i,1);
    }
  }

  // update particles
  for(let i=particles.length-1;i>=0;i--){
    let p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life--;
    if(p.life<=0) particles.splice(i,1);
  }

  // update ground effects
  for(let i=groundFX.length-1;i>=0;i--){
    groundFX[i].life--;
    if(groundFX[i].life<=0) groundFX.splice(i,1);
  }

  // bomb flash decay
  if(bombFlash > 0) bombFlash--;

  // update dmg texts
  for(let i=dmgTexts.length-1;i>=0;i--){
    dmgTexts[i].life--;
    if(dmgTexts[i].life<=0) dmgTexts.splice(i,1);
  }

  // kill streak decay
  if(killStreakTimer > 0) killStreakTimer -= dt;
  if(killStreakTimer <= 0) killStreak = 0;

  // screen shake decay
  shakeX *= 0.8;
  shakeY *= 0.8;

  // camera
  camX += (player.x - camX) * 0.1;
  camY += (player.y - camY) * 0.1;

  // check death
  if(player.hp <= 0){
    gameOver();
  }

  // update HUD
  document.getElementById('hp').textContent = Math.ceil(player.hp);
  document.getElementById('maxhp').textContent = player.maxHp;
  document.getElementById('level').textContent = player.level;
  document.getElementById('kills').textContent = kills;
  document.getElementById('wave').textContent = waveNum;
  let streakEl = document.getElementById('streak');
  streakEl.textContent = killStreak >= 3 ? killStreak + 'x' : '-';
  streakEl.style.color = killStreak >= 10 ? '#f00' : killStreak >= 5 ? '#fa0' : killStreak >= 3 ? '#ff0' : '#888';
  let secs = Math.floor(gameTime/60);
  let m = Math.floor(secs/60);
  let s = secs%60;
  document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  let pulseSecs = Math.max(0, Math.ceil(player.magnetPulseCD / 60));
  let pulseEl = document.getElementById('pulse-cd');
  if(player.magnetPulseActive > 0){ pulseEl.textContent = '吸收中!'; pulseEl.style.color = '#4f4'; }
  else if(pulseSecs > 0){ pulseEl.textContent = pulseSecs + 's'; pulseEl.style.color = '#888'; }
  else { pulseEl.textContent = '就绪'; pulseEl.style.color = '#0f0'; }
  // dash HUD
  let dashEl = document.getElementById('dash-cd');
  if(player.dashTimer > 0){ dashEl.textContent = '冲刺中'; dashEl.style.color = '#88f'; }
  else if(player.dashCD > 0){ let dSecs = Math.ceil(player.dashCD/60); dashEl.textContent = dSecs+'s'; dashEl.style.color = '#888'; }
  else { dashEl.textContent = '就绪'; dashEl.style.color = '#0f0'; }
  // bomb HUD
  let bombEl = document.getElementById('bomb-cd');
  bombEl.textContent = bombCharges + '/' + bombMax;
  bombEl.style.color = bombCharges >= bombMax ? '#f80' : '#888';
  document.getElementById('xp-val').textContent = player.xp;
  document.getElementById('xp-need').textContent = player.xpToNext;
  document.getElementById('xp-bar').style.width = `${(player.xp/player.xpToNext)*100}%`;
}

// ===================== RENDER =====================
function drawCrosshair() {
  let braking = keys[' '] || keys['shift'];
  let spread = braking ? 0.01 : 0.55;
  let len = braking ? 8 : 14;
  let gap = braking ? 4 : 10;
  let color = braking ? '#fa0' : '#ff0';
  let alpha = braking ? 1 : 0.6;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = braking ? 2 : 1;
  // crosshair lines
  ctx.beginPath();
  ctx.moveTo(mouseX - len - gap, mouseY); ctx.lineTo(mouseX - gap, mouseY);
  ctx.moveTo(mouseX + gap, mouseY); ctx.lineTo(mouseX + len + gap, mouseY);
  ctx.moveTo(mouseX, mouseY - len - gap); ctx.lineTo(mouseX, mouseY - gap);
  ctx.moveTo(mouseX, mouseY + gap); ctx.lineTo(mouseX, mouseY + len + gap);
  ctx.stroke();
  // spread circle
  let sx = player.x - camX + W/2;
  let sy = player.y - camY + H/2;
  let dist = Math.hypot(mouseX - sx, mouseY - sy);
  let spreadRadius = Math.tan(spread/2) * dist;
  if(spreadRadius > 2){
    ctx.globalAlpha = alpha * 0.3;
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, spreadRadius, 0, Math.PI*2);
    ctx.stroke();
  }
  // brake indicator
  if(braking){
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#fa0';
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 3, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawBrakeEffect() {
  if(!(keys[' '] || keys['shift'])) return;
  let sx = player.x - camX + W/2;
  let sy = player.y - camY + H/2;
  ctx.save();
  // pulsing anchor glow
  let pulse = 1 + Math.sin(Date.now()*0.01)*0.2;
  ctx.globalAlpha = 0.12;
  ctx.beginPath();
  ctx.arc(sx, sy, PLAYER_RADIUS * 2.5 * pulse, 0, Math.PI*2);
  ctx.fillStyle = '#fa0';
  ctx.fill();
  // inner ring
  ctx.globalAlpha = 0.25;
  ctx.beginPath();
  ctx.arc(sx, sy, PLAYER_RADIUS * 1.5, 0, Math.PI*2);
  ctx.strokeStyle = '#fa0';
  ctx.lineWidth = 1;
  ctx.setLineDash([3,3]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawEdgeIndicators() {
  // arrows at screen edges pointing to off-screen enemies
  for(let e of enemies){
    let sx = e.x - camX + W/2;
    let sy = e.y - camY + H/2;
    if(sx > -30 && sx < W+30 && sy > -30 && sy < H+30) continue;
    let angle = Math.atan2(sy - H/2, sx - W/2);
    let edgeX = W/2 + Math.cos(angle) * (W/2 - 20);
    let edgeY = H/2 + Math.sin(angle) * (H/2 - 20);
    edgeX = Math.max(15, Math.min(W-15, edgeX));
    edgeY = Math.max(15, Math.min(H-15, edgeY));
    let dist = Math.hypot(e.x-player.x, e.y-player.y);
    if(dist > 800) continue;
    let alpha = Math.max(0.1, 1 - dist/800);
    ctx.save();
    ctx.translate(edgeX, edgeY);
    ctx.rotate(angle);
    ctx.globalAlpha = alpha * 0.6;
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(-4, -5);
    ctx.lineTo(-4, 5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawMinimap() {
  let mw = 120, mh = 120;
  let mx = W - mw - 10, my = 10;
  let scale = 0.04;
  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = '#111';
  ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx, my, mw, mh);
  // player dot
  let cx = mx + mw/2, cy = my + mh/2;
  ctx.fillStyle = '#0f0';
  ctx.beginPath();
  ctx.arc(cx, cy, 2, 0, Math.PI*2);
  ctx.fill();
  // enemies
  for(let e of enemies){
    let dx = (e.x - player.x) * scale;
    let dy = (e.y - player.y) * scale;
    if(Math.abs(dx) > mw/2-2 || Math.abs(dy) > mh/2-2) continue;
    if(e.isBoss){
      ctx.fillStyle = '#f0f';
      ctx.beginPath();
      ctx.arc(cx+dx, cy+dy, 3, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillStyle = e.color;
      ctx.fillRect(cx+dx-1, cy+dy-1, 2, 2);
    }
  }
  // xp orbs (tiny dots)
  ctx.fillStyle = '#4f4';
  for(let o of xpOrbs){
    let dx = (o.x - player.x) * scale;
    let dy = (o.y - player.y) * scale;
    if(Math.abs(dx) > mw/2-2 || Math.abs(dy) > mh/2-2) continue;
    ctx.fillRect(cx+dx, cy+dy, 1, 1);
  }
  // magnet orbs
  ctx.fillStyle = '#f4f';
  for(let o of magnetOrbs){
    let dx = (o.x - player.x) * scale;
    let dy = (o.y - player.y) * scale;
    if(Math.abs(dx) > mw/2-2 || Math.abs(dy) > mh/2-2) continue;
    ctx.fillRect(cx+dx-1, cy+dy-1, 3, 3);
  }
  // obstacles
  ctx.fillStyle = '#665';
  for(let o of obstacles){
    let dx = (o.x - player.x) * scale;
    let dy = (o.y - player.y) * scale;
    if(Math.abs(dx) > mw/2-2 || Math.abs(dy) > mh/2-2) continue;
    ctx.fillRect(cx+dx-1, cy+dy-1, 2, 2);
  }
  // hp potions
  ctx.fillStyle = '#f44';
  for(let o of hpPotions){
    let dx = (o.x - player.x) * scale;
    let dy = (o.y - player.y) * scale;
    if(Math.abs(dx) > mw/2-2 || Math.abs(dy) > mh/2-2) continue;
    ctx.fillRect(cx+dx-1, cy+dy-1, 2, 2);
  }
  ctx.restore();
}

function drawTurretLockLines() {
  let nearest = null, nd = Infinity;
  for(let e of enemies){
    let d = Math.hypot(e.x-player.x, e.y-player.y);
    if(d < nd && d < 350){ nd=d; nearest=e; }
  }
  if(!nearest) return;
  let psx = player.x - camX + W/2;
  let psy = player.y - camY + H/2;
  let esx = nearest.x - camX + W/2;
  let esy = nearest.y - camY + H/2;
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,6]);
  ctx.beginPath();
  ctx.moveTo(psx, psy);
  ctx.lineTo(esx, esy);
  ctx.stroke();
  ctx.setLineDash([]);
  // target diamond on enemy
  ctx.globalAlpha = 0.25;
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 1;
  let r = nearest.radius + 6;
  ctx.beginPath();
  ctx.moveTo(esx, esy-r); ctx.lineTo(esx+r, esy);
  ctx.lineTo(esx, esy+r); ctx.lineTo(esx-r, esy);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function render() {
  ctx.save();
  ctx.translate(shakeX, shakeY);
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);
  drawGrid();
  drawObstacles();
  // ground effects (under everything)
  for(let g of groundFX){
    let sx = g.x - camX + W/2;
    let sy = g.y - camY + H/2;
    if(sx < -50 || sx > W+50 || sy < -50 || sy > H+50) continue;
    ctx.save();
    ctx.globalAlpha = Math.min(0.4, g.life/200);
    ctx.beginPath();
    ctx.arc(sx, sy, g.radius, 0, Math.PI*2);
    ctx.fillStyle = g.color;
    ctx.fill();
    ctx.restore();
  }
  drawXpOrbs();
  drawBullets();
  // enemy bullets
  for(let b of enemyBullets){
    let sx = b.x - camX + W/2;
    let sy = b.y - camY + H/2;
    ctx.save();
    // trail
    ctx.globalAlpha = 0.2;
    ctx.beginPath();
    ctx.arc(sx-b.vx*1.5, sy-b.vy*1.5, b.radius, 0, Math.PI*2);
    ctx.fillStyle = b.color;
    ctx.fill();
    // bullet
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(sx, sy, b.radius, 0, Math.PI*2);
    ctx.fillStyle = b.color;
    ctx.fill();
    // glow
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(sx, sy, b.radius*2, 0, Math.PI*2);
    ctx.fillStyle = '#f00';
    ctx.fill();
    ctx.restore();
  }
  drawEnemies();
  // turret lock-on lines
  drawTurretLockLines();
  drawBrakeEffect();
  drawPlayer();
  drawParticles();
  drawDmgTexts();
  drawEdgeIndicators();
  // bomb flash overlay
  if(bombFlash > 0){
    ctx.save();
    ctx.globalAlpha = bombFlash/20 * 0.5;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
  ctx.restore();
  // UI elements drawn without shake
  drawCrosshair();
  drawMinimap();
  // boss HP bar at top of screen
  for(let e of enemies){
    if(!e.isBoss) continue;
    let bw = 300, bh = 8;
    let bx = W/2 - bw/2, by = 50;
    ctx.save();
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#400';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = '#f0f';
    ctx.fillRect(bx, by, bw*(e.hp/e.maxHp), bh);
    ctx.strokeStyle = '#f0f';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, bh);
    ctx.font = 'bold 12px Courier New';
    ctx.fillStyle = '#f0f';
    ctx.textAlign = 'center';
    ctx.fillText('BOSS', W/2, by-4);
    ctx.restore();
    break; // only show one boss bar
  }
}

// ===================== GAME LOOP =====================
function gameLoop() {
  if(!gameRunning) return;
  update(1);
  render();
  requestAnimationFrame(gameLoop);
}

// ===================== START / GAMEOVER =====================
function startGame() {
  initAudio();
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'none';
  resetPlayer();
  bullets = []; enemies = []; particles = []; xpOrbs = []; magnetOrbs = []; dmgTexts = []; hpPotions = []; enemyBullets = []; groundFX = [];
  obstacles = [];
  gameTime = 0; waveNum = 1; waveTimer = 0; kills = 0;
  killStreak = 0; killStreakTimer = 0;
  bombCharges = 0; bombFlash = 0;
  camX = 0; camY = 0;
  generateObstacles();
  gameRunning = true;
  gamePaused = false;
  gameLoop();
}

function gameOver() {
  gameRunning = false;
  let secs = Math.floor(gameTime/60);
  let m = Math.floor(secs/60);
  let s = secs%60;
  document.getElementById('final-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('final-level').textContent = player.level;
  document.getElementById('final-kills').textContent = kills;
  document.getElementById('game-over-screen').style.display = 'flex';
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);
</script>
